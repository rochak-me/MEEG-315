<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>MEEG 315 Interactive</title>
</head>
<body>
    <header>
        <h1>MEEG 315 Interactive</h1>
        <button id="toggleSidebar" aria-expanded="false">Toggle Sidebar</button>
    </header>
    <aside id="sidebar" aria-hidden="true">
        <nav>
            <ul>
                <li><a href="#section1">Section 1</a></li>
                <li><a href="#section2">Section 2</a></li>
            </ul>
        </nav>
    </aside>
    <main>
        <section id="section1">
            <h2>Section 1</h2>
            <div tabindex="0" role="button" aria-label="Select answer" onclick="answerMcq(1)">Answer 1</div>
            <div tabindex="0" role="button" aria-label="Select answer" onclick="answerMcq(2)">Answer 2</div>
        </section>
        <section id="section2">
            <h2>Section 2</h2>
            <p>Your score: <span id="summaryBox">0</span></p>
        </section>
    </main>
    <script>
        const toggleSidebar = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');

        toggleSidebar.addEventListener('click', () => {
            const isExpanded = toggleSidebar.getAttribute('aria-expanded') === 'true';
            toggleSidebar.setAttribute('aria-expanded', !isExpanded);
            sidebar.setAttribute('aria-hidden', isExpanded);
        });

        function answerMcq(answer) {
            // Logic for updating score...
            const score = calculateScore(answer);
            document.getElementById('summaryBox').innerText = score;
        }

        function calculateScore(answer) {
            // Your scoring logic here, updated to include necessary operations
            return answer === 1 ? 10 : 0; // Example logic
        }
    </script>
</body>
</html>
