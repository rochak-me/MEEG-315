<html>
<head>
    <title>MEEG 315 Interactive Quiz</title>
    <script>
        function validateForm() {
            const answers = document.querySelectorAll('input[type=radio]:checked');
            let correctAnswers = 0;
            const totalQuestions = 3; // Update this if more questions are added

            answers.forEach(answer => {
                if (answer.value === 'correct') {
                    correctAnswers++;
                }
            });

            const feedback = document.getElementById('feedback');
            feedback.innerHTML = `You got ${correctAnswers} out of ${totalQuestions} correct!`;
        }
    </script>
</head>
<body>
    <h1>MEEG 315 Interactive Quiz</h1>
    <form onsubmit="validateForm(); return false;">
        <h2>Question 1:</h2>
        <input type="radio" name="q1" value="correct"> Correct Answer<br>
        <input type="radio" name="q1" value="wrong"> Wrong Answer<br>

        <h2>Question 2:</h2>
        <input type="radio" name="q2" value="wrong"> Wrong Answer<br>
        <input type="radio" name="q2" value="correct"> Correct Answer<br>

        <h2>Question 3:</h2>
        <input type="radio" name="q3" value="correct"> Correct Answer<br>
        <input type="radio" name="q3" value="wrong"> Wrong Answer<br>

        <button type="submit">Submit</button>
    </form>
    <div id="feedback"></div>
</body>
</html>
