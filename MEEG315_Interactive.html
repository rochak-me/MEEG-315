<html>
<head>
    <title>Study Hub</title>
    <style>
        /* Add your CSS here */
        @media (max-width: 900px) {
            .sidebar {
                display: none;
                position: fixed;
                left: 0;
                top: 0;
                width: 250px;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                z-index: 100;
            }
            .sidebar.open {
                display: block;
            }
            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 99;
            }
            .overlay.visible {
                display: block;
            }
        }
        :focus-visible {
            outline: 2px solid #005fcc;
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <button class="close-btn" aria-expanded="false" aria-hidden="true">Close</button>
        <h1>Study Hub</h1>
        <button tabindex="0">Sidebar Item 1</button>
        <button tabindex="0">Sidebar Item 2</button>
        <h2 tabindex="0">Section Header 1</h2>
        <h2 tabindex="0">Section Header 2</h2>
        <button tabindex="0" class="mcq-option">MCQ Option 1</button>
        <button tabindex="0" class="mcq-option">MCQ Option 2</button>
    </div>
    <button id="toggle-sidebar">Toggle Sidebar</button>
    <script>
        const toggleButton = document.getElementById('toggle-sidebar');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        toggleButton.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('visible');
            const expanded = sidebar.classList.contains('open');
            sidebar.querySelector('.close-btn').setAttribute('aria-expanded', expanded);
            sidebar.querySelector('.close-btn').setAttribute('aria-hidden', !expanded);
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('visible');
            sidebar.querySelector('.close-btn').setAttribute('aria-expanded', 'false');
            sidebar.querySelector('.close-btn').setAttribute('aria-hidden', 'true');
        });

        sidebar.querySelector('.close-btn').addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('visible');
            sidebar.querySelector('.close-btn').setAttribute('aria-expanded', 'false');
            sidebar.querySelector('.close-btn').setAttribute('aria-hidden', 'true');
        });

        // Keyboard accessibility for sidebar items
        const sidebarItems = sidebar.querySelectorAll('button, h2');
        sidebarItems.forEach(item => {
            item.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    item.click();
                }
            });
        });
    </script>
</body>
</html>
